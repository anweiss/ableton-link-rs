name: Conventional Commits

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]
    branches: [main]

permissions:
  pull-requests: read

jobs:
  check-title:
    name: Validate PR title
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # Require conventional commit format in PR title
          # (squash merges use PR title as commit message)
          types: |
            feat
            fix
            docs
            style
            refactor
            perf
            test
            build
            ci
            chore
            revert
          requireScope: false
          subjectPattern: ^.+$
          subjectPatternError: |
            The PR title "{title}" doesn't follow conventional commit format.
            
            Please use one of: feat:, fix:, docs:, style:, refactor:, perf:, test:, build:, ci:, chore:, revert:
            
            Examples:
              feat: add tempo smoothing algorithm
              fix: resolve Windows multicast binding error
              chore: bump dependencies
