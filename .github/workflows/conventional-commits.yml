name: Conventional Commits

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]
    branches: [main]
  workflow_dispatch:
    inputs:
      pull_request_number:
        description: 'PR number to validate (used by retrigger workflow for bot PRs)'
        required: true
        type: string

permissions:
  pull-requests: read

jobs:
  check-title:
    name: Validate PR title
    runs-on: ubuntu-latest
    steps:
      - name: Validate via semantic-pull-request action
        if: github.event_name == 'pull_request'
        uses: amannn/action-semantic-pull-request@e32d7e603df1aa1ba07e981f2a23455dee596825 # v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # Require conventional commit format in PR title
          # (squash merges use PR title as commit message)
          types: |
            feat
            fix
            docs
            style
            refactor
            perf
            test
            build
            ci
            chore
            revert
          requireScope: false
          subjectPattern: ^.+$
          subjectPatternError: |
            The PR title "{title}" doesn't follow conventional commit format.

            Please use one of: feat:, fix:, docs:, style:, refactor:, perf:, test:, build:, ci:, chore:, revert:

            Examples:
              feat: add tempo smoothing algorithm
              fix: resolve Windows multicast binding error
              chore: bump dependencies

      # When invoked via workflow_dispatch (by the retrigger workflow for bot PRs),
      # github.event.pull_request isn't available. Fetch the PR and validate the
      # title with a simple regex so branch protection sees a green check on the
      # PR's head SHA.
      - name: Validate bot PR title
        if: github.event_name == 'workflow_dispatch'
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v8
        with:
          script: |
            const prNumber = Number('${{ inputs.pull_request_number }}');
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
            });
            const pattern = /^(feat|fix|docs|style|refactor|perf|test|build|ci|chore|revert)(\([^)]+\))?!?: .+$/;
            if (!pattern.test(pr.title)) {
              core.setFailed(`PR title "${pr.title}" doesn't follow conventional commit format.`);
            } else {
              core.info(`PR #${prNumber} title "${pr.title}" is valid.`);
            }
