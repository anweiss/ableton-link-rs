name: Release Please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        id: release
        with:
          release-type: rust
          # Prefer a PAT so the resulting PR triggers downstream workflows
          # (CI, Security Audit, Conventional Commits). GITHUB_TOKEN is
          # subject to the anti-recursion rule and won't fire those
          # workflows. The retrigger-ci workflow provides a fallback but
          # also requires a PAT to work. Set RELEASE_PLEASE_PAT with
          # pull-requests: write access to wire this up.
          token: ${{ secrets.RELEASE_PLEASE_PAT || secrets.GITHUB_TOKEN }}
