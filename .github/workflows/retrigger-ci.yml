name: Re-trigger CI for bot PRs

# Why this workflow exists
# ========================
# When release-please opens or updates its release PR, it does so using
# GITHUB_TOKEN. GitHub's anti-recursion rule means that any event
# triggered by GITHUB_TOKEN (push, pull_request, etc., with the
# exception of workflow_dispatch and repository_dispatch) will NOT fire
# downstream workflows. That means the required CI / Security Audit /
# Conventional Commits checks never run on the release PR, and branch
# protection stays BLOCKED forever.
#
# The standard GitHub-documented workaround is to use a non-GITHUB_TOKEN
# identity (Personal Access Token or GitHub App token) to close and
# re-open the PR. The resulting pull_request events then fire workflows
# as expected, and their check runs are properly associated with the PR
# for branch protection evaluation.
#
# Trials of the workflow_dispatch approach (triggering CI directly)
# failed because workflow_dispatch-triggered check runs, while visible
# on the commit, are NOT included in the PR's statusCheckRollup that
# branch protection evaluates.
#
# Setup required
# ==============
# Create a fine-grained PAT (or classic token with `repo` scope) with
# write access to pull requests on this repository, and store it as a
# repository secret named RELEASE_PLEASE_PAT.
#
# If the secret is not set, the workflow logs a clear warning and exits
# cleanly — a maintainer can still close/reopen the PR by hand, or an
# admin can merge with branch protection bypassed.
on:
  workflow_run:
    workflows: ["Release Please"]
    types: [completed]
  workflow_dispatch: {}

permissions:
  pull-requests: read
  contents: read

jobs:
  retrigger:
    runs-on: ubuntu-latest
    steps:
      - name: Close and reopen release-please PRs to trigger CI
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v8
        env:
          RELEASE_PLEASE_PAT: ${{ secrets.RELEASE_PLEASE_PAT }}
        with:
          github-token: ${{ secrets.RELEASE_PLEASE_PAT || secrets.GITHUB_TOKEN }}
          script: |
            if (!process.env.RELEASE_PLEASE_PAT) {
              core.warning(
                'RELEASE_PLEASE_PAT secret is not set. Close/reopen via ' +
                'GITHUB_TOKEN will not trigger CI. Set a PAT with ' +
                '`pull-requests: write` access to make this work.'
              );
              return;
            }
            const { owner, repo } = context.repo;
            const { data: prs } = await github.rest.pulls.list({
              owner, repo, state: 'open', per_page: 100,
            });
            const releasePRs = prs.filter(pr =>
              pr.user && pr.user.login === 'github-actions[bot]' &&
              pr.head.ref.startsWith('release-please--')
            );
            if (releasePRs.length === 0) {
              core.info('No open release-please PRs to retrigger.');
              return;
            }
            for (const pr of releasePRs) {
              core.info(`Retriggering CI for PR #${pr.number}`);
              await github.rest.pulls.update({
                owner, repo, pull_number: pr.number, state: 'closed',
              });
              await new Promise(r => setTimeout(r, 3000));
              await github.rest.pulls.update({
                owner, repo, pull_number: pr.number, state: 'open',
              });
            }
